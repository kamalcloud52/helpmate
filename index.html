<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpMate - We're Ready to Help</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50">

    <div id="splash-screen" class="fixed inset-0 bg-gradient-to-br from-indigo-600 to-purple-500 flex flex-col items-center justify-center z-50">
        <div class="bg-white p-6 rounded-3xl shadow-2xl mb-4">
            <i class="fas fa-handshake text-5xl text-indigo-600"></i>
        </div>
        <h1 class="text-white text-3xl font-bold tracking-tight">HelpMate</h1>
        <p class="text-indigo-100 mt-2">we're ready to help</p>
    </div>

    <main id="app-content" class="hidden max-w-md mx-auto min-h-screen bg-white shadow-xl relative overflow-hidden">
        
        <section id="login-section" class="p-8 pt-20 fade-in">
            <div class="mb-10 text-center">
                <h2 class="text-3xl font-bold text-gray-800">Hi, Mate!</h2>
                <p class="text-gray-500 mt-2">Silakan masuk untuk melanjutkan</p>
            </div>
            <form id="login-form" class="space-y-5">
                <input type="email" id="email" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Email" required>
                <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Password" required>
                <button type="submit" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl shadow-lg transition active:scale-95">LOGIN</button>
            </form>
        </section>

        <section id="role-section" class="hidden p-8 pt-12 fade-in">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Pilih peranmu hari ini</h2>
            <div class="grid gap-4">
                <button onclick="selectRole('customer')" class="flex items-center p-5 border-2 border-gray-100 rounded-2xl hover:border-indigo-500 transition text-left">
                    <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center mr-4"><i class="fas fa-user"></i></div>
                    <div><h3 class="font-bold">CUSTOMER</h3><p class="text-xs text-gray-500">Pesan jasa apa saja.</p></div>
                </button>
                <button onclick="selectRole('helper')" class="flex items-center p-5 border-2 border-gray-100 rounded-2xl hover:border-rose-500 transition text-left">
                    <div class="w-12 h-12 bg-rose-100 text-rose-600 rounded-xl flex items-center justify-center mr-4"><i class="fas fa-hands-helping"></i></div>
                    <div><h3 class="font-bold">HELPER</h3><p class="text-xs text-gray-500">Bantu sesama & hasilkan uang.</p></div>
                </button>
                <button onclick="selectRole('shopper')" class="flex items-center p-5 border-2 border-gray-100 rounded-2xl hover:border-amber-500 transition text-left">
                    <div class="w-12 h-12 bg-amber-100 text-amber-600 rounded-xl flex items-center justify-center mr-4"><i class="fas fa-shopping-bag"></i></div>
                    <div><h3 class="font-bold">PERSONAL SHOPPER</h3><p class="text-xs text-gray-500">Jasa belanja profesional.</p></div>
                </button>
            </div>
        </section>

        <div id="main-interface" class="hidden h-screen flex flex-col">
            <div id="pages-container" class="flex-1 overflow-y-auto pb-24">
                
                <div id="page-home" class="p-6 space-y-6 fade-in">
                    <h3 class="font-bold text-gray-800">Kategori Jasa</h3>
                    <div class="grid grid-cols-4 gap-4">
                        <div class="flex flex-col items-center"><div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mb-1"><i class="fas fa-utensils"></i></div><span class="text-[10px] font-bold">FOOD</span></div>
                        <div class="flex flex-col items-center"><div class="w-12 h-12 bg-rose-50 text-rose-600 rounded-2xl flex items-center justify-center mb-1"><i class="fas fa-shopping-cart"></i></div><span class="text-[10px] font-bold">SHOP</span></div>
                        <div class="flex flex-col items-center"><div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center mb-1"><i class="fas fa-broom"></i></div><span class="text-[10px] font-bold">CLEAN</span></div>
                        <div class="flex flex-col items-center"><div class="w-12 h-12 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mb-1"><i class="fas fa-ellipsis-h"></i></div><span class="text-[10px] font-bold">MORE</span></div>
                    </div>
                </div>

                <div id="page-search" class="hidden p-6 fade-in">
                    <input type="text" class="w-full bg-gray-100 p-4 rounded-2xl outline-none" placeholder="Cari Helper...">
                </div>

                <div id="page-order" class="hidden p-6 fade-in">
                    <h3 class="font-bold mb-4">Pesanan Aktif</h3>
                    <div class="bg-white border-2 border-indigo-50 p-5 rounded-3xl shadow-sm">
                        <p class="text-[10px] font-bold text-amber-600 mb-2 uppercase tracking-tighter">Dalam Proses</p>
                        <h4 class="font-bold text-gray-800">Belanja di Pasar Baru</h4>
                        <button class="w-full mt-4 py-3 bg-indigo-50 text-indigo-600 font-bold rounded-xl text-sm">Lacak Lokasi</button>
                    </div>
                </div>

                <div id="page-profile" class="hidden p-8 flex flex-col items-center fade-in">
                    <div class="w-24 h-24 bg-indigo-100 rounded-full mb-4 border-4 border-white shadow-lg overflow-hidden">
                        <img src="https://ui-avatars.com/api/?name=Kamal&background=4f46e5&color=fff" alt="Avatar">
                    </div>
                    <h2 class="text-xl font-bold">Kamal</h2>
                    <p class="text-indigo-600 text-sm mb-8">Verified Member</p>
                    <button onclick="location.reload()" class="w-full p-4 bg-rose-50 text-rose-600 rounded-2xl font-bold">LOGOUT</button>
                </div>
            </div>

            <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-gray-100 flex justify-around p-4 rounded-t-[32px] shadow-2xl z-40">
                <button onclick="showPage('home')" id="nav-home" class="nav-btn text-indigo-600 flex flex-col items-center">
                    <i class="fas fa-home text-xl mb-1"></i><span class="text-[9px] font-bold">HOME</span>
                </button>
                <button onclick="showPage('search')" id="nav-search" class="nav-btn text-gray-300 flex flex-col items-center">
                    <i class="fas fa-search text-xl mb-1"></i><span class="text-[9px] font-bold">SEARCH</span>
                </button>
                <button onclick="showPage('order')" id="nav-order" class="nav-btn text-gray-300 flex flex-col items-center">
                    <i class="fas fa-receipt text-xl mb-1"></i><span class="text-[9px] font-bold">ORDERS</span>
                </button>
                <button onclick="showPage('profile')" id="nav-profile" class="nav-btn text-gray-300 flex flex-col items-center">
                    <i class="fas fa-user text-xl mb-1"></i><span class="text-[9px] font-bold">PROFILE</span>
                </button>
            </nav>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
