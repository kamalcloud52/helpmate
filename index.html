<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpMate - We're Ready to Help</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50">

    <div id="splash-screen" class="fixed inset-0 bg-gradient-to-br from-indigo-600 to-purple-500 flex flex-col items-center justify-center z-50">
        <div class="bg-white p-6 rounded-3xl shadow-2xl mb-4">
            <i class="fas fa-handshake text-5xl text-indigo-600"></i>
        </div>
        <h1 class="text-white text-3xl font-bold tracking-tight">HelpMate</h1>
        <p class="text-indigo-100 mt-2">we're ready to help</p>
    </div>

    <main id="app-content" class="hidden max-w-md mx-auto min-h-screen bg-white shadow-xl relative overflow-hidden">
        
        <section id="login-section" class="p-8 pt-20 fade-in">
            <div class="mb-10 text-center">
                <h2 class="text-3xl font-bold text-gray-800">Hi, Mate!</h2>
                <p class="text-gray-500 mt-2">Silakan masuk untuk melanjutkan</p>
            </div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                    <input type="email" id="email" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition" placeholder="example@mail.com">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition" placeholder="••••••••">
                </div>
                <div class="text-right">
                    <a href="#" class="text-sm font-medium text-indigo-600 hover:text-indigo-800">Lupa password?</a>
                </div>
                <button type="submit" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-200 transition-all active:scale-95">
                    LOGIN
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-gray-500">Belum punya akun? <a href="#" class="text-indigo-600 font-bold">Daftar Sekarang</a></p>
            </div>
        </section>

        <section id="role-section" class="hidden p-8 pt-12 fade-in">
            <div class="mb-8">
                <h2 class="text-2xl font-bold text-gray-800">Selamat Datang,</h2>
                <p class="text-gray-500">Pilih peranmu hari ini</p>
            </div>

            <div class="grid gap-4">
                <button onclick="selectRole('customer')" class="group relative flex items-center p-5 bg-white border-2 border-gray-100 rounded-2xl hover:border-indigo-500 hover:bg-indigo-50 transition-all text-left shadow-sm">
                    <div class="w-14 h-14 bg-indigo-100 rounded-xl flex items-center justify-center text-indigo-600 mr-4 group-hover:bg-indigo-600 group-hover:text-white transition">
                        <i class="fas fa-user-tag text-xl"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-gray-800">CUSTOMER</h3>
                        <p class="text-xs text-gray-500">Pesan jasa apa saja, di mana saja.</p>
                    </div>
                </button>

                <button onclick="selectRole('helper')" class="group relative flex items-center p-5 bg-white border-2 border-gray-100 rounded-2xl hover:border-rose-500 hover:bg-rose-50 transition-all text-left shadow-sm">
                    <div class="w-14 h-14 bg-rose-100 rounded-xl flex items-center justify-center text-rose-600 mr-4 group-hover:bg-rose-600 group-hover:text-white transition">
                        <i class="fas fa-hands-helping text-xl"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-gray-800">HELPER</h3>
                        <p class="text-xs text-gray-500">Bantu sesama dan dapatkan penghasilan.</p>
                    </div>
                </button>

                <button onclick="selectRole('shopper')" class="group relative flex items-center p-5 bg-white border-2 border-gray-100 rounded-2xl hover:border-amber-500 hover:bg-amber-50 transition-all text-left shadow-sm">
                    <div class="w-14 h-14 bg-amber-100 rounded-xl flex items-center justify-center text-amber-600 mr-4 group-hover:bg-amber-600 group-hover:text-white transition">
                        <i class="fas fa-shopping-bag text-xl"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-gray-800">PERSONAL SHOPPER</h3>
                        <p class="text-xs text-gray-500">Layanan belanja pribadi profesional.</p>
                    </div>
                </button>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
