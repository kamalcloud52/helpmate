<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpMate - Customer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50">

    <main class="max-w-md mx-auto min-h-screen bg-white shadow-xl relative pb-24">
        
        <header class="p-6 pt-8 flex justify-between items-center">
            <div>
                <h1 class="text-xs font-bold text-indigo-600 tracking-widest uppercase">Lokasi Kamu</h1>
                <div class="flex items-center text-gray-800">
                    <i class="fas fa-map-marker-alt text-rose-500 mr-2 text-sm"></i>
                    <span class="font-bold">Semarang, Indonesia</span>
                    <i class="fas fa-chevron-down ml-2 text-xs text-gray-400"></i>
                </div>
            </div>
            <div class="relative">
                <button class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-600">
                    <i class="far fa-bell text-lg"></i>
                </button>
                <span class="absolute top-0 right-0 w-3 h-3 bg-rose-500 border-2 border-white rounded-full"></span>
            </div>
        </header>

        <div class="px-6 mb-6">
            <div class="relative group">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-indigo-600 transition"></i>
                <input type="text" placeholder="Cari Helper atau jasa..." 
                    class="w-full pl-12 pr-4 py-3 bg-gray-100 border-transparent rounded-2xl focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition">
            </div>
        </div>

        <section class="px-6 mb-8">
            <h2 class="font-bold text-gray-800 mb-4">Kategori Layanan</h2>
            <div class="grid grid-cols-3 gap-4">
                <div class="flex flex-col items-center">
                    <button class="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 mb-2 hover:bg-indigo-600 hover:text-white transition">
                        <i class="fas fa- couch text-xl"></i>
                    </button>
                    <span class="text-[10px] font-bold text-gray-600 text-center uppercase tracking-tighter">Lifestyle</span>
                </div>
                <div class="flex flex-col items-center">
                    <button class="w-16 h-16 bg-rose-50 rounded-2xl flex items-center justify-center text-rose-600 mb-2 hover:bg-rose-600 hover:text-white transition">
                        <i class="fas fa-globe text-xl"></i>
                    </button>
                    <span class="text-[10px] font-bold text-gray-600 text-center uppercase tracking-tighter">Global Shopper</span>
                </div>
                <div class="flex flex-col items-center">
                    <button class="w-16 h-16 bg-amber-50 rounded-2xl flex items-center justify-center text-amber-600 mb-2 hover:bg-amber-600 hover:text-white transition">
                        <i class="fas fa-users text-xl"></i>
                    </button>
                    <span class="text-[10px] font-bold text-gray-600 text-center uppercase tracking-tighter">Social Mate</span>
                </div>
            </div>
        </section>

        <section class="px-6 mb-8">
            <div class="bg-gradient-to-r from-indigo-600 to-purple-600 rounded-3xl p-5 text-white shadow-lg shadow-indigo-200">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-indigo-100 text-xs">Sedang Berlangsung</p>
                        <h3 class="font-bold text-lg">Pesanan #HM-8815</h3>
                    </div>
                    <span class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold backdrop-blur-sm">DIKEMAS</span>
                </div>
                <div class="flex items-center space-x-3 bg-white/10 p-3 rounded-2xl">
                    <div class="w-10 h-10 rounded-xl bg-white flex items-center justify-center text-indigo-600 font-bold">
                        BW
                    </div>
                    <div class="flex-1">
                        <p class="text-xs font-bold">Budi Waluyo</p>
                        <p class="text-[10px] text-indigo-100 italic">"Sedang menuju lokasi..."</p>
                    </div>
                    <button class="bg-white text-indigo-600 px-4 py-2 rounded-xl text-xs font-bold shadow-sm">Track</button>
                </div>
            </div>
        </section>

        <section class="px-6 mb-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-gray-800">Helper Terpopuler</h2>
                <a href="#" class="text-xs font-bold text-indigo-600">Lihat Semua</a>
            </div>
            <div class="flex space-x-4 overflow-x-auto no-scrollbar pb-4">
                <div class="min-w-[140px] bg-white border border-gray-100 rounded-2xl p-3 shadow-sm">
                    <div class="relative mb-3">
                        <img src="https://i.pravatar.cc/150?u=1" class="w-full h-24 object-cover rounded-xl" alt="Helper">
                        <div class="absolute top-2 right-2 bg-white/90 px-2 py-1 rounded-lg backdrop-blur-sm">
                            <span class="text-[10px] font-bold text-amber-500"><i class="fas fa-star mr-1"></i>4.9</span>
                        </div>
                    </div>
                    <h3 class="text-xs font-bold text-gray-800 truncate">Sarah Johnson</h3>
                    <p class="text-[10px] text-gray-500 mb-3">Professional Shopper</p>
                    <button class="w-full py-2 bg-gray-50 text-indigo-600 text-[10px] font-bold rounded-lg hover:bg-indigo-600 hover:text-white transition">HIRE</button>
                </div>
                <div class="min-w-[140px] bg-white border border-gray-100 rounded-2xl p-3 shadow-sm">
                    <div class="relative mb-3">
                        <img src="https://i.pravatar.cc/150?u=2" class="w-full h-24 object-cover rounded-xl" alt="Helper">
                        <div class="absolute top-2 right-2 bg-white/90 px-2 py-1 rounded-lg backdrop-blur-sm">
                            <span class="text-[10px] font-bold text-amber-500"><i class="fas fa-star mr-1"></i>4.8</span>
                        </div>
                    </div>
                    <h3 class="text-xs font-bold text-gray-800 truncate">Dimas Pratama</h3>
                    <p class="text-[10px] text-gray-500 mb-3">Lifestyle Expert</p>
                    <button class="w-full py-2 bg-gray-50 text-indigo-600 text-[10px] font-bold rounded-lg hover:bg-indigo-600 hover:text-white transition">HIRE</button>
                </div>
            </div>
        </section>

        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white/80 backdrop-blur-md border-t border-gray-100 px-8 py-4 flex justify-between items-center z-40">
            <button class="text-indigo-600 flex flex-col items-center">
                <i class="fas fa-home text-xl mb-1"></i>
                <span class="text-[10px] font-bold">Home</span>
            </button>
            <button class="text-gray-400 flex flex-col items-center hover:text-indigo-600 transition">
                <i class="fas fa-receipt text-xl mb-1"></i>
                <span class="text-[10px] font-bold">Orders</span>
            </button>
            <div class="relative -mt-12">
                <button class="w-14 h-14 bg-indigo-600 text-white rounded-full shadow-lg shadow-indigo-200 flex items-center justify-center border-4 border-white active:scale-90 transition">
                    <i class="fas fa-plus text-xl"></i>
                </button>
            </div>
            <button class="text-gray-400 flex flex-col items-center hover:text-indigo-600 transition">
                <i class="fas fa-comments text-xl mb-1"></i>
                <span class="text-[10px] font-bold">Chat</span>
            </button>
            <button class="text-gray-400 flex flex-col items-center hover:text-indigo-600 transition">
                <i class="fas fa-user text-xl mb-1"></i>
                <span class="text-[10px] font-bold">Profile</span>
            </button>
        </nav>

    </main>
</body>
</html>
